<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Sync Arrow 1 (Gradient 1) -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Sync Arrow 2 (Gradient 2) -->
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Smooth Rounded Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Outer Sync Loop Left -->
  <path d="M 180,120 
           C 90,160 70,280 140,360 
           C 180,400 230,420 280,410 
           L 290,370 
           C 250,380 210,365 180,335 
           C 130,280 145,190 210,160 
           Z" 
        fill="url(#grad1)" filter="url(#glow)" />

  <!-- Outer Sync Loop Right -->
  <path d="M 332,392 
           C 422,352 442,232 372,152 
           C 332,112 282,92 232,102 
           L 222,142 
           C 262,132 302,147 332,177 
           C 382,232 367,322 302,352 
           Z" 
        fill="url(#grad2)" filter="url(#glow)" />

  <!-- Arrow Heads -->
  <!-- Left to Right Top Arrow -->
  <path d="M 230,60 L 300,105 L 230,150 Z" fill="url(#grad2)" />
  <!-- Right to Left Bottom Arrow -->
  <path d="M 282,452 L 212,407 L 282,362 Z" fill="url(#grad1)" />
  
  <!-- Code Brackets < > -->
  <path d="M 200,210 L 150,256 L 200,302" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95" />
  <path d="M 312,210 L 362,256 L 312,302" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95" />
  
  <!-- Sync Center Pulse -->
  <circle cx="256" cy="256" r="14" fill="#ffffff" filter="url(#glow)" />
</svg>