<svg viewBox="0 0 1400 512" width="1400" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" /> 
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    
    <linearGradient id="gradL" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#d946ef" /> 
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#a855f7" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g transform="translate(40, 0)">
    <!-- The Icon -->
    <g filter="url(#glow)">
      <!-- The D Curve -->
      <path d="M 120 130 L 280 130 A 126 126 0 0 1 280 382" fill="none" stroke="url(#gradD)" stroke-width="36" stroke-linecap="round" />
      <!-- The Circles -->
      <circle cx="120" cy="130" r="28" fill="url(#gradD)" />
      <circle cx="280" cy="382" r="28" fill="url(#gradD)" />
      <!-- The L Shape -->
      <path d="M 120 200 L 120 342 A 40 40 0 0 0 160 382 L 200 382" fill="none" stroke="url(#gradL)" stroke-width="36" stroke-linecap="round" />
    </g>

    <!-- The Code Brackets -->
    <g fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
      <polyline points="230,216 180,256 230,296" />
      <polyline points="290,216 340,256 290,296" />
    </g>
  </g>

  <!-- TEXT PART -->
  <text x="490" y="306" font-family="'Inter', '-apple-system', sans-serif" font-weight="900" font-size="170" letter-spacing="-5" fill="#FFFFFF">Dev</text>
  <text x="770" y="306" font-family="'Inter', '-apple-system', sans-serif" font-weight="900" font-size="170" letter-spacing="-5" fill="url(#gradD)">Sync</text>
</svg>
